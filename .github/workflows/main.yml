name: Compile C++ to HTML5 Website
on: [push]

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten (Web Compiler)
      uses: mymindstorm/setup-emsdk@v14

    - name: Download Precompiled Raylib Web Files
      run: |
        sudo apt-get update
        sudo apt-get install -y libraylib-dev

    - name: Compile Folder into Website
      run: |
        emcc *.cpp -o index.html -Os -Wall -s USE_GLFW=3 -s ASYNCIFY -s TOTAL_MEMORY=67108864 -s USE_RAYLIB=1 -DPLATFORM_WEB

    - name: Deploy Game to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: .
        branch: gh-pages
