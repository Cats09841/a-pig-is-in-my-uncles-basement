<!doctypehtml><html><head><meta charset=utf-8><title>Raylib Game Debugger</title><style>body{background:#222;color:#fff;font-family:sans-serif;text-align:center}canvas{background:#000;display:block;margin:10px auto;max-width:100%}#output{width:80%;height:150px;margin:20px auto;background:#000;color:#0f0;font-family:monospace;padding:10px;text-align:left;overflow-y:scroll;border:2px solid #555}</style></head><body><h2>My Raylib Game Output</h2><canvas id=canvas oncontextmenu=event.preventDefault()></canvas><h3>Live Console Logs:</h3><textarea id=output readonly></textarea><script>var Module={canvas:document.getElementById("canvas"),print:function(){var t=document.getElementById("output");return function(n){t&&(t.value+=n+"\n",t.scrollTop=t.scrollHeight)}}(),printErr:function(t){var n=document.getElementById("output");n&&(n.value+="ERROR: "+t+"\n",n.scrollTop=n.scrollHeight)}};window.onerror=function(t){document.getElementById("output").value+="CRASH EXCEPTION: "+t+"\n"}</script><script async src=index.js></script></body></html>
